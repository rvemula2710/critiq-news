<!DOCTYPE html>
<html>
<head>
  <title>Critiq</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont;
      background: linear-gradient(135deg, #0a0f1c, #0d1b2a);
      color: white;
    }

    /* HEADER */
    .header {
      display: flex;
      align-items: center;
      padding: 16px 24px;
      backdrop-filter: blur(20px);
      background: rgba(255,255,255,0.05);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .logo {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: 1px;
      margin-right: 30px;
    }

    .tabs {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .tab {
      padding: 8px 14px;
      border-radius: 20px;
      background: rgba(255,255,255,0.08);
      cursor: pointer;
      transition: 0.3s;
    }

    .tab:hover {
      background: rgba(255,255,255,0.2);
    }

    .active {
      background: #4cc9f0;
      color: black;
    }

    .search {
      margin-left: auto;
    }

    input {
      padding: 8px 14px;
      border-radius: 20px;
      border: none;
      outline: none;
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px,1fr));
      gap: 20px;
      padding: 20px;
    }

    /* CARD */
    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px) scale(1.02);
      background: rgba(255,255,255,0.1);
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .content {
      padding: 15px;
    }

    .title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .desc {
      font-size: 14px;
      opacity: 0.7;
    }

    .load {
      text-align: center;
      margin: 20px;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 20px;
      background: #4cc9f0;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    <div class="logo">critiq</div>

    <div class="tabs">
      <div class="tab active" onclick="loadNews('india', this)">India</div>
      <div class="tab" onclick="loadNews('telangana', this)">Telangana</div>
      <div class="tab" onclick="loadNews('hyderabad', this)">Hyderabad</div>
      <div class="tab" onclick="loadNews('world', this)">World</div>
      <div class="tab" onclick="loadTrending(this)">🔥 Trending</div>
    </div>

    <div class="search">
      <input type="text" id="search" placeholder="Search..." onkeydown="handleSearch(event)">
    </div>
  </div>

  <!-- NEWS GRID -->
  <div class="grid" id="news"></div>

  <div class="load">
    <button onclick="loadMore()">Load More</button>
  </div>

  <script>

    const BASE_URL = "https://critiq-backend-0i4w.onrender.com";

    let allArticles = [];
    let visible = 6;

    /* LOAD NEWS */
    async function loadNews(q, el){

      setActive(el);

      const res = await fetch(`${BASE_URL}/news?q=${q}`);
      const data = await res.json();

      allArticles = data.articles || [];
      visible = 6;

      render();
    }

    /* TRENDING */
    async function loadTrending(el){

      setActive(el);

      const res = await fetch(`${BASE_URL}/trending`);
      const data = await res.json();

      allArticles = data.articles || [];
      visible = 6;

      render();
    }

    /* SEARCH */
    function handleSearch(e){
      if(e.key === "Enter"){
        loadNews(e.target.value);
      }
    }

    /* RENDER */
    function render(){

      const container = document.getElementById("news");

      container.innerHTML = allArticles.slice(0, visible).map(a => `
        <div class="card" onclick="window.open('${a.url}', '_blank')">
          <img src="https://source.unsplash.com/400x300/?news" />
          <div class="content">
            <div class="title">${a.title}</div>
            <div class="desc">${a.description || ''}</div>
          </div>
        </div>
      `).join('');
    }

    /* LOAD MORE */
    function loadMore(){
      visible += 6;
      render();
    }

    /* ACTIVE TAB */
    function setActive(el){
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      if(el) el.classList.add("active");
    }

    /* DEFAULT LOAD */
    loadNews("india");

  </script>

</body>
</html>
