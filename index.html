<!DOCTYPE html>
<html>
<head>
  <title>Critiq</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont;
      background: linear-gradient(135deg, #0b1220, #0d1b2a);
      color: white;
    }

    /* HEADER */
    .header {
      display: flex;
      align-items: center;
      padding: 16px 24px;
      backdrop-filter: blur(25px);
      background: rgba(255,255,255,0.06);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: 1px;
      margin-right: 20px;
    }

    .tabs {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .tab {
      padding: 8px 14px;
      border-radius: 20px;
      background: rgba(255,255,255,0.08);
      cursor: pointer;
      transition: 0.3s;
    }

    .tab:hover {
      background: rgba(255,255,255,0.2);
    }

    .active {
      background: rgba(76,201,240,0.9);
      color: black;
    }

    .search {
      margin-left: auto;
    }

    input {
      padding: 8px 14px;
      border-radius: 20px;
      border: none;
      outline: none;
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px,1fr));
      gap: 20px;
      padding: 20px;
    }

    /* CARD */
    .card {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(20px);
      border-radius: 18px;
      padding: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-6px);
      background: rgba(255,255,255,0.1);
    }

    .title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .desc {
      font-size: 14px;
      opacity: 0.7;
    }

    .load {
      text-align: center;
      margin: 20px;
    }

    button {
      padding: 10px 20px;
      border-radius: 20px;
      border: none;
      background: #4cc9f0;
      cursor: pointer;
    }

    .loading {
      text-align: center;
      padding: 40px;
      opacity: 0.7;
    }

    .empty {
      text-align: center;
      padding: 40px;
      opacity: 0.6;
    }
  </style>
</head>

<body>

  <div class="header">
    <div class="logo">Critiq</div>

    <div class="tabs">
      <div class="tab active" onclick="loadNews('india', this)">India</div>
      <div class="tab" onclick="loadNews('telangana', this)">Telangana</div>
      <div class="tab" onclick="loadNews('hyderabad', this)">Hyderabad</div>
      <div class="tab" onclick="loadNews('world', this)">World</div>
      <div class="tab" onclick="loadTrending(this)">🔥 Trending</div>
    </div>

    <div class="search">
      <input placeholder="Search..." onkeydown="handleSearch(event)">
    </div>
  </div>

  <div class="grid" id="news"></div>

  <div class="load">
    <button onclick="loadMore()">Load More</button>
  </div>

  <script>

    const BASE_URL = "https://critiq-backend-0i4w.onrender.com";

    let allArticles = [];
    let visible = 6;

    async function loadNews(q, el){
      setActive(el);
      showLoading();

      try {
        const res = await fetch(`${BASE_URL}/news?q=${q}`);
        const data = await res.json();

        allArticles = data.articles || [];
        visible = 6;

        if(allArticles.length === 0){
          showEmpty();
        } else {
          render();
        }

      } catch {
        showError();
      }
    }

    async function loadTrending(el){
      setActive(el);
      showLoading();

      try {
        const res = await fetch(`${BASE_URL}/trending`);
        const data = await res.json();

        allArticles = data.articles || [];
        visible = 6;

        if(allArticles.length === 0){
          showEmpty();
        } else {
          render();
        }

      } catch {
        showError();
      }
    }

    function handleSearch(e){
      if(e.key === "Enter"){
        loadNews(e.target.value);
      }
    }

    function render(){
      const container = document.getElementById("news");

      container.innerHTML = allArticles.slice(0, visible).map(a => `
        <div class="card" onclick="window.open('${a.url}', '_blank')">
          <div class="title">${a.title}</div>
          <div class="desc">${a.description || ''}</div>
        </div>
      `).join('');
    }

    function loadMore(){
      visible += 6;
      render();
    }

    function showLoading(){
      document.getElementById("news").innerHTML =
        "<div class='loading'>Loading news...</div>";
    }

    function showError(){
      document.getElementById("news").innerHTML =
        "<div class='loading'>Failed to load</div>";
    }

    function showEmpty(){
      document.getElementById("news").innerHTML =
        "<div class='empty'>No news available</div>";
    }

    function setActive(el){
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      if(el) el.classList.add("active");
    }

    // default load
    loadNews("india");

  </script>

</body>
</html>
