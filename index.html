<!DOCTYPE html>
<html>
<head>
  <title>Critiq News</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    header {
      padding: 15px;
      font-size: 24px;
      background: #020617;
    }

    .nav {
      display: flex;
      gap: 10px;
      padding: 10px;
      background: #111827;
      flex-wrap: wrap;
    }

    .nav button {
      background: none;
      border: none;
      color: #cbd5f5;
      cursor: pointer;
    }

    .nav button:hover {
      color: white;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 10px;
    }

    .card img {
      width: 100%;
      border-radius: 8px;
    }

    a {
      text-decoration: none;
      color: white;
    }
  </style>
</head>

<body>

<header>Critiq</header>

<div class="nav">
  <button onclick="loadPriorityNews()">Home</button>
  <button onclick="loadTrending()">🔥 Trending</button>
  <button onclick="changeCategory('technology')">Tech</button>
  <button onclick="changeCategory('sports')">Sports</button>
</div>

<div class="container" id="news"></div>

<script>

const BASE_URL = "https://news-backend-9jt9.onrender.com/news";

/* ===========================
   PRIORITY NEWS
=========================== */
async function loadPriorityNews(){

  const queries = [
    "india",
    "telangana",
    "hyderabad",
    "world"
  ];

  let all = [];

  for(let q of queries){
    const res = await fetch(`${BASE_URL}?q=${q}`);
    const data = await res.json();
    all = all.concat(data.articles || []);
  }

  renderNews(all);
}

/* ===========================
   TRENDING (LAST 12 HOURS)
=========================== */
async function loadTrending(){

  const queries = [
    "hyderabad",
    "india",
    "world"
  ];

  let all = [];

  for(let q of queries){
    const res = await fetch(`${BASE_URL}?q=${q}`);
    const data = await res.json();
    all = all.concat(data.articles || []);
  }

  // Filter last 12 hours
  const now = new Date();
  const filtered = all.filter(a => {
    if(!a.publishedAt) return false;

    const time = new Date(a.publishedAt);
    const diff = (now - time) / (1000 * 60 * 60);

    return diff <= 12;
  });

  renderNews(filtered);
}

/* ===========================
   NORMAL CATEGORY
=========================== */
async function changeCategory(category){

  const res = await fetch(`${BASE_URL}?q=${category}`);
  const data = await res.json();

  renderNews(data.articles || []);
}

/* ===========================
   RENDER
=========================== */
function renderNews(articles){

  const newsDiv = document.getElementById("news");
  newsDiv.innerHTML = "";

  if(!articles || articles.length === 0){
    newsDiv.innerHTML = "<p>No news found</p>";
    return;
  }

  articles.forEach(a => {
    newsDiv.innerHTML += `
      <a href="${a.url}" target="_blank">
        <div class="card">
          ${a.urlToImage ? `<img src="${a.urlToImage}">` : ""}
          <h3>${a.title}</h3>
          <p>${a.description || ""}</p>
        </div>
      </a>
    `;
  });
}

/* ===========================
   AUTO REFRESH TRENDING
=========================== */
setInterval(() => {
  const currentTab = window.currentTab;
  if(currentTab === "trending"){
    loadTrending();
  }
}, 300000); // 5 mins

window.currentTab = "home";
loadPriorityNews();

</script>

</body>
</html>
