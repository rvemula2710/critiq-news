<!DOCTYPE html>
<html>
<head>
  <title>Critiq News</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: radial-gradient(circle at top, #1e293b, #020617 80%);
      color: white;
    }

    header {
      position: sticky;
      top: 0;
      backdrop-filter: blur(20px);
      background: rgba(255,255,255,0.05);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding: 20px;
      z-index: 100;
    }

    /* ===== LOGO ===== */
    .logo-wrap {
      text-align: center;
      margin-bottom: 15px;
    }

    .logo {
      font-size: 30px;
      font-weight: 600;
      letter-spacing: 0.5px;
      background: linear-gradient(90deg, #ffffff, #d1d5db);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0;
    }

    .logo span {
      margin-left: 4px;
      color: #94a3b8;
      text-shadow: 0 0 6px rgba(255,255,255,0.2);
    }

    /* ===== NAV BAR ===== */
    .nav-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      padding: 8px 12px;
      border-radius: 10px;
      border: none;
      background: rgba(255,255,255,0.08);
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: rgba(255,255,255,0.2);
    }

    .active {
      background: rgba(255,255,255,0.25);
    }

    /* ===== SEARCH ===== */
    .search-wrap input {
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.08);
      color: white;
      outline: none;
      width: 220px;
    }

    .search-wrap input::placeholder {
      color: #9ca3af;
    }

    /* ===== NEWS GRID ===== */
    #news {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 25px;
      padding: 25px;
    }

    .card-link {
      text-decoration: none;
      color: inherit;
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(18px);
      border-radius: 20px;
      padding: 15px;
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      transition: 0.25s;
    }

    .card:hover {
      transform: translateY(-6px);
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 14px;
    }

    .card small {
      color: #9ca3af;
    }

    .card h3 {
      margin: 10px 0;
      font-size: 17px;
    }

    .card p {
      font-size: 14px;
      color: #d1d5db;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .loading {
      text-align: center;
      padding: 50px;
    }
  </style>
</head>

<body>

<header>

  <!-- 🔥 FINAL LOGO -->
  <div class="logo-wrap">
    <h1 class="logo">Critiq<span>●</span></h1>
  </div>

  <!-- NAV -->
  <div class="nav-bar">

    <div class="tabs">
      <button onclick="setCategory('general', this)" class="active">General</button>
      <button onclick="setCategory('technology', this)">Tech</button>
      <button onclick="setCategory('sports', this)">Sports</button>
      <button onclick="setCategory('world', this)">World</button>
      <button onclick="setCategory('india', this)">India</button>
      <button onclick="setCategory('telangana', this)">Telangana</button>
      <button onclick="setCategory('hyderabad', this)">Hyderabad</button>
      <button onclick="setCategory('iran war', this)">Iran War</button>
    </div>

    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Search news...">
    </div>

  </div>

</header>

<div id="news"></div>

<script>

const BASE_URL = "https://news-backend-9jt9.onrender.com/news";

function setCategory(category, btn){
  document.querySelectorAll(".tabs button").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  loadNews(category);
}

async function loadNews(category){
  const newsDiv = document.getElementById('news');
  newsDiv.innerHTML = "<div class='loading'>Loading...</div>";

  const res = await fetch(`${BASE_URL}?q=${category}`);
  const data = await res.json();

  displayNews(data.articles);
}

async function searchNews(){
  const query = document.getElementById("searchInput").value;
  if(!query) return;

  const newsDiv = document.getElementById('news');
  newsDiv.innerHTML = "<div class='loading'>Searching...</div>";

  const res = await fetch(`${BASE_URL}?q=${query}`);
  const data = await res.json();

  displayNews(data.articles);
}

function displayNews(articles){
  const newsDiv = document.getElementById('news');
  newsDiv.innerHTML = "";

  if (!articles || articles.length === 0) {
    newsDiv.innerHTML = "<p>No news found</p>";
    return;
  }

  articles.forEach(a => {
    newsDiv.innerHTML += `
      <a href="${a.url}" target="_blank" class="card-link">
        <div class="card">
          ${a.urlToImage ? `<img src="${a.urlToImage}">` : ""}
          <small>${a.source?.name || ""}</small>
          <h3>${a.title}</h3>
          <p>${getSummary(a.description)}</p>
        </div>
      </a>
    `;
  });
}

function getSummary(text) {
  if (!text) return "👉 No summary available.";
  let words = text.split(" ").slice(0, 15).join(" ");
  return "👉 " + words + "...";
}

document.getElementById("searchInput").addEventListener("keypress", function(e){
  if(e.key === "Enter"){
    searchNews();
  }
});

loadNews('general');

</script>

</body>
</html>
