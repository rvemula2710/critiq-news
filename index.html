<!DOCTYPE html>
<html>
<head>
  <title>Critiq News</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: radial-gradient(circle at top, #1e293b, #020617 80%);
      color: white;
    }

    header {
      position: sticky;
      top: 0;
      backdrop-filter: blur(20px);
      background: rgba(255,255,255,0.05);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding: 20px;
      text-align: center;
      z-index: 100;
    }

    /* ===== LOGO ===== */
    .logo-glass-wrap {
      display: inline-block;
      padding: 14px 26px;
      border-radius: 20px;
      position: relative;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      overflow: hidden;
      animation: floatSoft 6s ease-in-out infinite;
    }

    .logo-glass-wrap::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 20px;
      background: radial-gradient(circle at var(--x,50%) var(--y,50%), rgba(255,255,255,0.25), transparent 40%);
      opacity: 0;
      transition: 0.3s;
    }

    .logo-glass-wrap:hover::after { opacity: 1; }

    @keyframes floatSoft {
      0% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
      100% { transform: translateY(0); }
    }

    .logo-text {
      font-size: 28px;
      font-weight: 600;
      margin: 0;
    }

    .logo-text span { color: #9ca3af; }

    /* ===== SEARCH ===== */
    .search-wrap {
      margin-top: 18px;
    }

    .search-wrap input {
      width: 340px;
      max-width: 90%;
      padding: 12px 18px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      color: white;
      outline: none;
      transition: 0.25s;
    }

    .search-wrap input:focus {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.3);
    }

    .search-wrap input::placeholder {
      color: #9ca3af;
    }

    /* ===== CATEGORY BUTTONS ===== */
    .categories {
      margin-top: 15px;
    }

    button {
      padding: 10px 14px;
      border-radius: 10px;
      border: none;
      background: rgba(255,255,255,0.08);
      color: white;
      cursor: pointer;
      margin: 4px;
      transition: 0.2s;
    }

    button:hover {
      background: rgba(255,255,255,0.2);
    }

    .active {
      background: rgba(255,255,255,0.25);
    }

    /* ===== NEWS GRID ===== */
    #news {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 25px;
      padding: 25px;
    }

    .card-link {
      text-decoration: none;
      color: inherit;
    }

    .card {
      position: relative;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(18px);
      border-radius: 20px;
      padding: 15px;
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      overflow: hidden;
      transition: 0.25s;
    }

    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 20px;
      background: radial-gradient(circle at var(--x,50%) var(--y,50%), rgba(255,255,255,0.2), transparent 50%);
      opacity: 0;
      transition: 0.3s;
    }

    .card:hover::after { opacity: 1; }

    .card:hover {
      transform: translateY(-6px);
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 14px;
    }

    .card small {
      color: #9ca3af;
    }

    .card h3 {
      margin: 10px 0;
    }

    .card p {
      font-size: 14px;
      color: #d1d5db;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .loading {
      text-align: center;
      font-size: 20px;
      padding: 50px;
    }
  </style>
</head>

<body>

<header>

  <div class="logo-glass-wrap" id="logoGlass">
    <h1 class="logo-text">Critiq<span>.</span></h1>
  </div>

  <!-- 🔍 SEARCH -->
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Search news...">
  </div>

  <div class="categories">
    <button onclick="setCategory('general', this)" class="active">General</button>
    <button onclick="setCategory('technology', this)">Tech</button>
    <button onclick="setCategory('sports', this)">Sports</button>
  </div>

</header>

<div id="news"></div>

<script>

const BASE_URL = "https://news-backend-9jt9.onrender.com/news";

/* Liquid glass effect */
function applyLiquidEffect(selector){
  document.querySelectorAll(selector).forEach(el => {
    el.addEventListener("mousemove", e => {
      const rect = el.getBoundingClientRect();
      const x = ((e.clientX - rect.left) / rect.width) * 100;
      const y = ((e.clientY - rect.top) / rect.height) * 100;
      el.style.setProperty('--x', x + '%');
      el.style.setProperty('--y', y + '%');
    });
  });
}

applyLiquidEffect('.card');
applyLiquidEffect('#logoGlass');

function setCategory(category, btn){
  document.querySelectorAll(".categories button").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  loadNews(category);
}

async function loadNews(category){
  const newsDiv = document.getElementById('news');
  newsDiv.innerHTML = "<div class='loading'>Loading...</div>";

  const res = await fetch(`${BASE_URL}?q=${category}`);
  const data = await res.json();

  displayNews(data.articles);
}

async function searchNews(){
  const query = document.getElementById("searchInput").value;
  if(!query) return;

  const newsDiv = document.getElementById('news');
  newsDiv.innerHTML = "<div class='loading'>Searching...</div>";

  const res = await fetch(`${BASE_URL}?q=${query}`);
  const data = await res.json();

  displayNews(data.articles);
}

function displayNews(articles){
  const newsDiv = document.getElementById('news');
  newsDiv.innerHTML = "";

  if (!articles || articles.length === 0) {
    newsDiv.innerHTML = "<p>No news found</p>";
    return;
  }

  articles.forEach(a => {
    newsDiv.innerHTML += `
      <a href="${a.url}" target="_blank" class="card-link">
        <div class="card">
          ${a.urlToImage ? `<img src="${a.urlToImage}">` : ""}
          <small>${a.source?.name || ""}</small>
          <h3>${a.title}</h3>
          <p>${getSummary(a.description)}</p>
        </div>
      </a>
    `;
  });

  applyLiquidEffect('.card');
}

function getSummary(text) {
  if (!text) return "👉 No summary available.";
  let words = text.split(" ").slice(0, 15).join(" ");
  return "👉 " + words + "...";
}

/* ENTER KEY SEARCH */
document.getElementById("searchInput").addEventListener("keypress", function(e){
  if(e.key === "Enter"){
    searchNews();
  }
});

loadNews('general');

</script>

</body>
</html>
