<!DOCTYPE html>
<html>
<head>
  <title>Critiq News</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      background: #111827;
      padding: 15px 20px;
      font-size: 24px;
      font-weight: bold;
    }

    .nav {
      display: flex;
      gap: 15px;
      padding: 10px 20px;
      background: #1f2937;
      flex-wrap: wrap;
    }

    .nav button {
      background: none;
      border: none;
      color: white;
      cursor: pointer;
    }

    .nav button:hover {
      color: #60a5fa;
    }

    .container {
      padding: 20px;
    }

    /* HERO SECTION */
    .top-section {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
      margin-bottom: 30px;
    }

    .hero {
      background: #1f2937;
      padding: 15px;
      border-radius: 10px;
    }

    .hero img {
      width: 100%;
      border-radius: 10px;
    }

    .hero h2 {
      margin: 10px 0;
    }

    /* SIDE NEWS */
    .side-news {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .side-item {
      background: #1f2937;
      padding: 10px;
      border-radius: 10px;
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: #1f2937;
      padding: 10px;
      border-radius: 10px;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    a {
      text-decoration: none;
      color: white;
    }
  </style>
</head>

<body>

<header>📰 Critiq</header>

<div class="nav">
  <button onclick="loadNews('general')">General</button>
  <button onclick="loadNews('technology')">Tech</button>
  <button onclick="loadNews('sports')">Sports</button>
  <button onclick="loadNews('india')">India</button>
</div>

<div class="container">
  <div class="top-section">
    <div id="hero"></div>
    <div id="side"></div>
  </div>

  <div id="grid" class="grid"></div>
</div>

<script>

const BASE_URL = "https://news-backend-9jt9.onrender.com/news";

async function loadNews(category){

  const res = await fetch(`${BASE_URL}?q=${category}`);
  const data = await res.json();

  const articles = data.articles || [];

  const hero = document.getElementById("hero");
  const side = document.getElementById("side");
  const grid = document.getElementById("grid");

  hero.innerHTML = "";
  side.innerHTML = "";
  grid.innerHTML = "";

  if (articles.length === 0) return;

  // HERO
  const first = articles[0];
  hero.innerHTML = `
    <a href="${first.url}" target="_blank">
      <div class="hero">
        <img src="${first.urlToImage || ''}">
        <h2>${first.title}</h2>
        <p>${first.description || ''}</p>
      </div>
    </a>
  `;

  // SIDE
  articles.slice(1, 4).forEach(a => {
    side.innerHTML += `
      <a href="${a.url}" target="_blank">
        <div class="side-item">
          <h4>${a.title}</h4>
        </div>
      </a>
    `;
  });

  // GRID
  articles.slice(4).forEach(a => {
    grid.innerHTML += `
      <a href="${a.url}" target="_blank">
        <div class="card">
          <img src="${a.urlToImage || ''}">
          <h4>${a.title}</h4>
        </div>
      </a>
    `;
  });
}

loadNews('general');

</script>

</body>
</html>
