<!DOCTYPE html>
<html>
<head>
  <title>Critiq News</title>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .buttons {
      text-align: center;
      margin-bottom: 20px;
    }

    button {
      background: #222;
      color: white;
      border: none;
      padding: 10px 15px;
      margin: 5px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #00ffff;
      color: black;
    }

    .active {
      background: #00ffff;
      color: black;
    }

    #news {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      background: #1c1c1c;
      border-radius: 12px;
      padding: 15px;
      margin: 12px;
      width: 320px;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 25px rgba(0,0,0,0.8);
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 8px;
    }

    .card small {
      color: #888;
    }

    .card h3 {
      margin: 8px 0;
    }

    .card p {
      color: #aaa;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card a {
      color: cyan;
      text-decoration: none;
    }

    .loading {
      text-align: center;
      font-size: 20px;
      margin-top: 40px;
    }
  </style>

</head>

<body>

<h1>📰 Critiq News</h1>

<div class="buttons">
  <button onclick="setCategory('general', this)" class="active">General</button>
  <button onclick="setCategory('technology', this)">Tech</button>
  <button onclick="setCategory('sports', this)">Sports</button>
</div>

<div id="news"></div>

<script>

const BASE_URL = "https://news-backend-9jt9.onrender.com/news";

// Button handler
function setCategory(category, btn){
  document.querySelectorAll("button").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");

  loadNews(category);
}

// Load news
async function loadNews(category){

  const newsDiv = document.getElementById('news');

  // Loading state
  newsDiv.innerHTML = "<div class='loading'>Loading...</div>";

  try {
    const res = await fetch(`${BASE_URL}?q=${category}`);
    const data = await res.json();

    newsDiv.innerHTML = "";

    if (!data.articles || data.articles.length === 0) {
      newsDiv.innerHTML = "<p>No news found</p>";
      return;
    }

    data.articles.forEach(a => {
      newsDiv.innerHTML += `
        <div class="card">

          ${a.urlToImage ? `<img src="${a.urlToImage}">` : ""}

          <small>${a.source?.name || ""}</small>

          <h3>${a.title}</h3>

          <p>${a.description || ""}</p>

          <a href="${a.url}" target="_blank">Read more →</a>

        </div>
      `;
    });

  } catch (err) {
    newsDiv.innerHTML = "<p>⚠️ Failed to load news</p>";
    console.error(err);
  }
}

// Default load
loadNews('general');

</script>

</body>
</html>
