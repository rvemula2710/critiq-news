<!DOCTYPE html>
<html>
<head>
  <title>Critiq News</title>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .top-bar {
      text-align: center;
      margin-bottom: 20px;
    }

    input {
      padding: 10px;
      width: 250px;
      border-radius: 6px;
      border: none;
      margin-right: 10px;
    }

    button {
      background: #222;
      color: white;
      border: none;
      padding: 10px 15px;
      margin: 5px;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #00ffff;
      color: black;
    }

    .active {
      background: #00ffff;
      color: black;
    }

    #news {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      background: #1c1c1c;
      border-radius: 12px;
      padding: 15px;
      margin: 12px;
      width: 320px;
      transition: 0.2s;
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 8px;
    }

    .card small {
      color: #888;
    }

    .card h3 {
      margin: 8px 0;
    }

    .card p {
      color: #aaa;
      font-size: 14px;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-link {
      text-decoration: none;
      color: inherit;
    }

    .loading {
      text-align: center;
      font-size: 20px;
      margin-top: 40px;
    }
  </style>

</head>

<body>

<h1>📰 Critiq News</h1>

<div class="top-bar">
  <input type="text" id="searchInput" placeholder="Search news...">
  <button onclick="searchNews()">Search</button>
</div>

<div class="top-bar">
  <button onclick="setCategory('general', this)" class="active">General</button>
  <button onclick="setCategory('technology', this)">Tech</button>
  <button onclick="setCategory('sports', this)">Sports</button>
</div>

<div id="news"></div>

<script>

const BASE_URL = "https://news-backend-9jt9.onrender.com/news";

// Category
function setCategory(category, btn){
  document.querySelectorAll(".top-bar button").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  loadNews(category);
}

// Load news
async function loadNews(category){
  const newsDiv = document.getElementById('news');
  newsDiv.innerHTML = "<div class='loading'>Loading...</div>";

  const res = await fetch(`${BASE_URL}?q=${category}`);
  const data = await res.json();

  displayNews(data.articles);
}

// Search
async function searchNews(){
  const query = document.getElementById("searchInput").value;
  if(!query) return;

  const newsDiv = document.getElementById('news');
  newsDiv.innerHTML = "<div class='loading'>Searching...</div>";

  const res = await fetch(`${BASE_URL}?q=${query}`);
  const data = await res.json();

  displayNews(data.articles);
}

// Display
function displayNews(articles){
  const newsDiv = document.getElementById('news');
  newsDiv.innerHTML = "";

  if (!articles || articles.length === 0) {
    newsDiv.innerHTML = "<p>No news found</p>";
    return;
  }

  articles.forEach(a => {
    newsDiv.innerHTML += `
      <a href="${a.url}" target="_blank" class="card-link">

        <div class="card">

          ${a.urlToImage ? `<img src="${a.urlToImage}">` : ""}

          <small>${a.source?.name || ""}</small>

          <h3>${a.title}</h3>

          <p>${getSummary(a.description)}</p>

        </div>

      </a>
    `;
  });
}

// AI-style summary
function getSummary(text) {
  if (!text) return "👉 No summary available.";

  let clean = text.replace(/<[^>]*>/g, "");
  let words = clean.split(" ").slice(0, 15).join(" ");

  return "👉 " + words + "...";
}

// Enter key
document.getElementById("searchInput").addEventListener("keypress", function(e){
  if(e.key === "Enter"){
    searchNews();
  }
});

// Default load
loadNews('general');

</script>

</body>
</html>
